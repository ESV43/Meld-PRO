name: Quick Debug Build

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths-ignore:
      - "README.md"
      - "fastlane/**"
      - "assets/**"
      - ".github/**/*.md"
      - ".github/FUNDING.yml"
      - ".github/ISSUE_TEMPLATE/**"

permissions:
  contents: write

jobs:
  build_debug:
    name: Quick Universal Debug Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Init metroproto submodule
        run: git submodule update --init metroproto

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }}
          cache-cleanup: on-success

      - name: Setup and Generate Protobuf
        uses: ./.github/actions/setup-protobuf

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create Android Debug Keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -storepass android -alias androiddebugkey \
            -keypass android -keyalg RSA -keysize 2048 \
            -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: Build Debug APK (No Lint)
        run: ./gradlew --console=plain assembleFossDebug --warning-mode summary -x lint -x lintFossDebug
        env:
          METROLIST_APPLICATION_ID: com.meld.app.test
          METROLIST_APP_NAME: Meld Testing
          PULL_REQUEST: "false"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_SECRET: ${{ secrets.LASTFM_SECRET }}

      - name: Move APK
        run: |
          OUTPUT_DIR="app/build/outputs/apk/foss/debug"
          mkdir -p "$OUTPUT_DIR/out"
          DEBUG_APK=$(find "$OUTPUT_DIR" -maxdepth 1 -name "*.apk" | head -n 1)
          if [ -n "$DEBUG_APK" ]; then
            mv "$DEBUG_APK" "$OUTPUT_DIR/out/app-universal-test-debug.apk"
          else
            echo "Error: No debug APK found to move!"
            exit 1
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: app-universal-test-debug
          path: app/build/outputs/apk/foss/debug/out/*
